name: CD Pipeline — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════
  # GATE — Run CI checks first
  # ═══════════════════════════════════════════
  ci-gate:
    name: ✅ CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ═══════════════════════════════════════════
  # DEPLOY BACKEND — HuggingFace Spaces
  # ═══════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend → HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: ci-gate
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'backend'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='backend',
              repo_id='${{ secrets.HF_SPACE_ID }}',
              repo_type='space',
              token='${{ secrets.HF_TOKEN }}',
              delete_patterns=['*.pyc', '__pycache__', 'venv/', 'data/', '.env'],
          )
          print('✅ Backend deployed to HuggingFace Spaces')
          "

      - name: Wait for Space to rebuild
        run: sleep 120

      - name: Verify deployment
        run: |
          BACKEND_URL="https://${{ secrets.HF_SPACE_ID_SLUG }}.hf.space"
          echo "Checking $BACKEND_URL/api/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend is healthy!"
              exit 0
            fi
            sleep 30
          done
          echo "⚠️ Backend health check failed after 5 attempts"
          exit 1

  # ═══════════════════════════════════════════
  # DEPLOY FRONTEND — Vercel
  # ═══════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: ci-gate
    if: >
      github.event_name == 'push' ||
      github.event.inputs.deploy_target == 'all' ||
      github.event.inputs.deploy_target == 'frontend'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

  # ═══════════════════════════════════════════
  # POST-DEPLOY — Smoke Tests
  # ═══════════════════════════════════════════
  smoke-test:
    name: 🔥 Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    steps:
      - name: Test backend health
        run: |
          BACKEND_URL="https://${{ secrets.HF_SPACE_ID_SLUG }}.hf.space"
          echo "Testing backend at $BACKEND_URL..."
          curl -sf "$BACKEND_URL/api/health" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Unhealthy: {data}'
          print('✅ Backend health check passed:', data)
          "

      - name: Test frontend health
        run: |
          FRONTEND_URL="https://scholarmind.vercel.app"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend is live (HTTP $STATUS)"
          else
            echo "⚠️ Frontend returned HTTP $STATUS"
            exit 1
          fi

      - name: Test API endpoints
        run: |
          BACKEND_URL="https://${{ secrets.HF_SPACE_ID_SLUG }}.hf.space"

          echo "Testing /api/papers..."
          curl -sf "$BACKEND_URL/api/papers?limit=1" > /dev/null && echo "✅ Papers API OK"

          echo "Testing /api/aiops/dashboard..."
          curl -sf "$BACKEND_URL/api/aiops/dashboard" > /dev/null && echo "✅ Dashboard API OK"

          echo "Testing /api/mlops/models..."
          curl -sf "$BACKEND_URL/api/mlops/models" > /dev/null && echo "✅ Models API OK"

          echo "🎉 All smoke tests passed!"
