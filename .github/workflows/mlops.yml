name: MLOps — Scheduled Ingestion & Model Monitoring

on:
  schedule:
    # Run every 6 hours — fetch new papers and check model drift
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "ingest"
        type: choice
        options:
          - ingest
          - drift-check
          - full-pipeline

jobs:
  # ═══════════════════════════════════════════
  # INGESTION — Fetch new papers on schedule
  # ═══════════════════════════════════════════
  scheduled-ingestion:
    name: 📥 Scheduled Paper Ingestion
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.action == 'ingest' ||
      github.event.inputs.action == 'full-pipeline'
    steps:
      - name: Trigger ingestion via API
        run: |
          BACKEND_URL="https://${{ secrets.HF_SPACE_ID_SLUG }}.hf.space"
          echo "Triggering ingestion pipeline..."
          
          RESPONSE=$(curl -sf -X POST "$BACKEND_URL/api/ingestion/trigger" \
            -H "Content-Type: application/json" || echo '{"error": "failed"}')
          
          echo "Response: $RESPONSE"

      - name: Wait for ingestion to complete
        run: sleep 120

      - name: Check ingestion status
        run: |
          BACKEND_URL="https://${{ secrets.HF_SPACE_ID_SLUG }}.hf.space"
          curl -sf "$BACKEND_URL/api/ingestion/status" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print('📊 Ingestion Status:')
          print(json.dumps(data, indent=2))
          "

  # ═══════════════════════════════════════════
  # DRIFT — Check for model/data drift
  # ═══════════════════════════════════════════
  drift-detection:
    name: 📉 Data Drift Detection
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.action == 'drift-check' ||
      github.event.inputs.action == 'full-pipeline'
    steps:
      - name: Check drift metrics
        run: |
          BACKEND_URL="https://${{ secrets.HF_SPACE_ID_SLUG }}.hf.space"
          echo "Checking drift metrics..."
          
          curl -sf "$BACKEND_URL/api/mlops/drift" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          records = data.get('records', [])
          
          drifted = [r for r in records if r.get('is_drifted')]
          if drifted:
            print('⚠️ DRIFT DETECTED:')
            for r in drifted:
              print(f'  - {r[\"drift_type\"]}: {r[\"metric_name\"]} = {r[\"metric_value\"]} (threshold: {r[\"threshold\"]})')
            # Don't fail — just report
          else:
            print('✅ No drift detected')
          "

  # ═══════════════════════════════════════════
  # MONITORING — Dashboard health snapshot
  # ═══════════════════════════════════════════
  health-snapshot:
    name: 📊 Health Snapshot
    runs-on: ubuntu-latest
    needs: [scheduled-ingestion, drift-detection]
    if: always()
    steps:
      - name: Capture dashboard metrics
        run: |
          BACKEND_URL="https://${{ secrets.HF_SPACE_ID_SLUG }}.hf.space"
          echo "Capturing health snapshot..."
          
          curl -sf "$BACKEND_URL/api/aiops/dashboard" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          
          metrics = data.get('metrics', {})
          system = metrics.get('system', {})
          vs = metrics.get('vector_store', {})
          qs = data.get('query_stats', {})
          ing = data.get('ingestion_stats', {})
          
          print('╔════════════════════════════════════════╗')
          print('║     ScholarMind Health Snapshot         ║')
          print('╠════════════════════════════════════════╣')
          print(f'║ CPU Usage:       {system.get(\"cpu_percent\", 0):>6}%              ║')
          print(f'║ Memory:          {system.get(\"memory_used_mb\", 0):>6} MB            ║')
          print(f'║ Vectors Indexed: {vs.get(\"total_vectors\", 0):>6}               ║')
          print(f'║ Queries (24h):   {qs.get(\"total_queries\", 0):>6}               ║')
          print(f'║ Papers (7d):     {ing.get(\"total_new_papers\", 0):>6}               ║')
          print(f'║ Alerts:          {len(data.get(\"alerts\", [])):>6}               ║')
          print('╚════════════════════════════════════════╝')
          
          # Check for critical alerts
          alerts = data.get('alerts', [])
          critical = [a for a in alerts if a.get('severity') == 'critical']
          if critical:
            print(f'🚨 {len(critical)} CRITICAL ALERTS:')
            for a in critical:
              print(f'  - {a[\"name\"]}: {a[\"message\"]}')
          "
